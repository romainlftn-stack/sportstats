<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sport Stats — Rebuild 2026</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F7F6F4;
      --surface:  #ffffff;
      --border:   #e8e6e3;
      --border2:  #d0ccc6;
      --text:     #1a1a18;
      --muted:    #8f8b84;
      --muted2:   #bcb8b1;
      --green:    #1a9456;
      --blue:     #2c5fe0;
      --pink:     #d63f74;
      --orange:   #d4620a;
      --red:      #c0392b;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05), 0 1px 5px rgba(0,0,0,.04);
      --shadow-md: 0 3px 10px rgba(0,0,0,.09), 0 1px 3px rgba(0,0,0,.05);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #0c0e14;
        --surface: #12151f;
        --border:  #1c2133;
        --border2: #242a3a;
        --text:    #d0d8ef;
        --muted:   #4a5470;
        --muted2:  #2e3650;
        --green:   #4ecb8d;
        --blue:    #4f8fff;
        --pink:    #ff5c9e;
        --orange:  #ff8c42;
        --red:     #ff6b6b;
        --shadow-sm: 0 1px 2px rgba(0,0,0,.35);
        --shadow-md: 0 3px 10px rgba(0,0,0,.5);
      }
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (max-width: 768px) {
      body { padding-bottom: max(80px, env(safe-area-inset-bottom, 80px)); }
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px 9px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 1px 0 var(--border), 0 2px 10px rgba(0,0,0,.05);
    }

    @media (prefers-color-scheme: dark) {
      .topbar { box-shadow: 0 1px 0 var(--border), 0 3px 14px rgba(0,0,0,.3); }
    }

    .brand {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted2);
      letter-spacing: .1em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .brand::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      box-shadow: 0 0 0 2px rgba(26,148,86,.18);
    }

    @media (prefers-color-scheme: dark) {
      .brand::before { box-shadow: 0 0 0 2px rgba(78,203,141,.2); }
    }

    .topbar-right { display: flex; align-items: center; gap: 6px; }

    /* Groupe de boutons icônes harmonisés */
    .btn-group {
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
      gap: 0;
    }

    .btn-icon {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: none;
      border: none;
      border-left: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: color .15s, background .15s;
      padding: 0; line-height: 1;
      text-decoration: none;
      touch-action: manipulation;
      flex-shrink: 0;
    }
    .btn-icon:first-child { border-left: none; }
    .btn-icon:hover { color: var(--text); background: var(--surface); }
    .btn-icon:active { transform: scale(.92); }
    .btn-icon.spinning { animation: spin .6s linear infinite; }

    /* Bouton Reporter — même hauteur, style pill séparé */
    .shift-btn {
      height: 28px;
      display: flex; align-items: center;
      font-size: 9px;
      font-family: var(--mono);
      color: var(--orange);
      border: 1px solid var(--orange);
      background: transparent;
      padding: 0 10px;
      border-radius: 7px;
      cursor: pointer;
      letter-spacing: .06em;
      transition: all .15s;
      text-transform: uppercase;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .shift-btn:hover { background: var(--orange); color: #fff; }

    /* Flèches semaine dans topbar */
    .week-arrows {
      display: none;
      align-items: center;
      gap: 0;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
    }
    .week-arrows.visible { display: flex; }
    .week-arrow {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none;
      border-left: 1px solid var(--border);
      color: var(--muted); font-size: 11px;
      cursor: pointer;
      transition: color .15s, background .15s;
      padding: 0; touch-action: manipulation;
    }
    .week-arrow:first-child { border-left: none; }
    .week-arrow:hover:not(:disabled) { color: var(--text); background: var(--surface); }
    .week-arrow:disabled { opacity: .3; cursor: default; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── BODY ── */
    .widget-body { padding: 12px 13px 14px; }

    /* ── KPIs ── */
    .kpis {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      margin-bottom: 10px;
    }

    @media (max-width: 500px) {
      .kpis { grid-template-columns: repeat(2, 1fr); }
    }

    .kpi {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid;
      border-radius: 8px;
      padding: 9px 10px 8px;
      box-shadow: var(--shadow-sm);
      transition: transform .15s, box-shadow .15s;
    }
    .kpi:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

    .kpi-label {
      font-size: 9px; font-family: var(--mono);
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); margin-bottom: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .kpi-val {
      font-size: 17px; font-weight: 600;
      font-family: var(--mono); line-height: 1;
    }

    .kpi-sub { font-size: 9px; font-family: var(--mono); color: var(--muted); margin-top: 4px; }

    /* ── PROGRESS ── */
    .progress-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-sm);
    }

    .progress-header {
      display: flex; justify-content: space-between;
      font-size: 9px; font-family: var(--mono);
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted2); margin-bottom: 8px;
    }

    .progress-bar-bg {
      background: var(--border); border-radius: 4px;
      height: 6px; overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%; border-radius: 4px;
      background: var(--green); transition: width .6s ease;
    }

    /* ── CHART ── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px 9px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 10px;
    }

    .chart-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 8px;
    }

    .chart-label {
      font-size: 9px; font-family: var(--mono);
      text-transform: uppercase; letter-spacing: .08em; color: var(--muted2);
    }

    .toggles { display: flex; gap: 8px; }

    .toggle {
      font-size: 9px; font-family: var(--mono);
      display: flex; align-items: center; gap: 4px;
      cursor: pointer; opacity: 1; transition: opacity .15s; color: var(--muted);
    }
    .toggle.off { opacity: .35; }
    .toggle-line { width: 14px; height: 2px; border-radius: 1px; flex-shrink: 0; }

    canvas { max-height: 80px; }

    /* detail mode chart is taller */
    .detail-mode canvas { max-height: 110px; }

    /* ── DESKTOP DETAIL LAYOUT ── */
    @media (min-width: 900px) {
      .detail-mode .widget-body {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto;
        gap: 12px;
        padding: 16px 20px 20px;
        max-width: 1200px;
        margin: 0 auto;
      }

      /* Statut — pleine largeur */
      .detail-mode #status-block {
        grid-column: 1 / -1;
        margin-bottom: 0;
      }
      .detail-mode #status-inner { padding: 11px 16px; font-size: 11px; }

      /* KPIs — pleine largeur */
      .detail-mode .kpis {
        grid-column: 1 / -1;
        margin-bottom: 0;
        gap: 10px;
      }
      .detail-mode .kpi { padding: 14px 16px 13px; }
      .detail-mode .kpi-val { font-size: 22px; }
      .detail-mode .kpi-label { font-size: 10px; margin-bottom: 7px; }
      .detail-mode .kpi-sub { font-size: 10px; margin-top: 6px; }

      /* Progress — pleine largeur */
      .detail-mode .progress-wrap {
        grid-column: 1 / -1;
        margin-bottom: 0;
        padding: 14px 16px;
      }
      .detail-mode .progress-bar-bg { height: 8px; }
      .detail-mode .progress-header { font-size: 10px; margin-bottom: 10px; }

      /* Week nav — pleine largeur */
      .detail-mode .week-nav {
        grid-column: 1 / -1;
        margin-bottom: 0;
        padding: 10px 14px;
      }

      /* Chart — pleine largeur */
      .detail-mode .chart-wrap {
        grid-column: 1 / -1;
        margin-bottom: 0;
        padding: 14px 16px 12px;
      }
      .detail-mode canvas { max-height: 180px; }

      /* Table — pleine largeur */
      .detail-mode .table-wrap {
        grid-column: 1 / -1;
      }
      .detail-mode thead th { padding: 10px 14px 9px; font-size: 10px; }
      .detail-mode tbody td { padding: 10px 14px; font-size: 12px; }
    }


    /* ── SESSIONS PREVIEW (detail only) ── */
    .sessions-preview {
      display: none;
      margin-bottom: 10px;
    }

    .sessions-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    @media (max-width: 600px) {
      .sessions-cols { grid-template-columns: 1fr; }
    }

    .sessions-col {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .sessions-col-header {
      font-size: 9px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted2);
      padding: 8px 12px 7px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .session-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .session-item:last-child { border-bottom: none; }
    .session-item:hover { background: var(--bg); }

    /* À venir — accent bleu */
    .sessions-col.upcoming {
      border-left: 3px solid var(--blue);
    }
    .sessions-col.upcoming .sessions-col-header {
      color: var(--blue);
    }

    /* Récent — accent vert, items atténués */
    .sessions-col.recent {
      border-left: 3px solid var(--green);
    }
    .sessions-col.recent .sessions-col-header {
      color: var(--green);
    }
    .sessions-col.recent .session-item {
      opacity: .72;
    }
    .sessions-col.recent .session-item:hover {
      opacity: 1;
    }

    .session-type-badge {
      font-size: 9px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 3px 7px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px;
      font-weight: 600;
      border: 1px solid;
    }

    .session-info { flex: 1; min-width: 0; }

    .session-title {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
      font-weight: 500;
    }

    .sessions-col.upcoming .session-title {
      font-size: 12px;
    }

    .session-meta {
      font-size: 9px;
      font-family: var(--mono);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .session-when {
      font-family: var(--mono);
      font-size: 9px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .session-eva {
      width: 5px; height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* À venir — items plus lisibles */
    .sessions-col.upcoming .session-item { padding: 10px 12px; }
    .sessions-col.recent .session-item { opacity: .65; }
    .sessions-col.recent .session-item:hover { opacity: 1; }

    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      font-size: 9px; font-family: var(--mono);
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted2); padding: 8px 10px 7px;
      text-align: left; border-bottom: 1px solid var(--border);
      background: var(--bg); font-weight: 400;
    }

    tbody td {
      font-size: 11px; font-family: var(--mono);
      padding: 7px 10px; border-bottom: 1px solid var(--border);
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: var(--bg); }
    tbody tr.current-week { background: color-mix(in srgb, var(--green) 6%, var(--surface)); }

    .dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }

    /* ── WEEK NAV (detail only) ── */
    .week-nav {
      display: none; align-items: center; justify-content: space-between;
      padding: 7px 10px; margin-bottom: 10px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; box-shadow: var(--shadow-sm);
    }
    .week-nav.visible { display: flex; }

    .nav-btn {
      background: none; border: 1px solid var(--border);
      color: var(--muted); padding: 2px 8px; border-radius: 4px;
      font-family: var(--mono); font-size: 10px; cursor: pointer;
      transition: all .15s;
    }
    .nav-btn:hover:not(:disabled) { color: var(--text); border-color: var(--border2); }
    .nav-btn:disabled { opacity: .3; cursor: default; }

    .week-label {
      text-align: center;
      font-family: var(--mono); font-size: 10px; color: var(--text);
    }
    .week-label-pos { font-size: 9px; color: var(--muted2); margin-top: 1px; }

    /* ── MODAL DÉCALER ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      width: 280px;
      box-shadow: var(--shadow-md);
    }

    .modal-title {
      font-size: 11px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text);
      margin-bottom: 6px;
    }

    .modal-sub {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .modal-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .modal-input {
      width: 60px;
      padding: 7px 10px;
      font-family: var(--mono);
      font-size: 16px; /* iOS ne zoome pas si >= 16px */
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 6px;
      color: var(--text);
      text-align: center;
      touch-action: manipulation;
    }
    .modal-input:focus { outline: none; border-color: var(--orange); }

    .modal-input-label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
    }

    .modal-btns { display: flex; gap: 8px; }

    .modal-btn {
      flex: 1;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      cursor: pointer;
      transition: all .15s;
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .modal-btn-cancel {
      background: var(--bg);
      color: var(--muted);
    }
    .modal-btn-cancel:hover { color: var(--text); border-color: var(--border2); }

    .modal-btn-confirm {
      background: var(--orange);
      color: #fff;
      border-color: var(--orange);
    }
    .modal-btn-confirm:hover { opacity: .85; }
    .modal-btn-confirm:disabled { opacity: .5; cursor: default; }

    .session-item.missed {
      border-left: 2px solid var(--red);
      background: color-mix(in srgb, var(--red) 4%, var(--surface));
    }
    .session-item.missed:hover { background: color-mix(in srgb, var(--red) 8%, var(--surface)); }

    .missed-badge {
      font-size: 8px; font-family: var(--mono);
      color: var(--red); border: 1px solid var(--red);
      padding: 2px 5px; border-radius: 3px;
      flex-shrink: 0; margin-top: 2px;
      background: color-mix(in srgb, var(--red) 8%, transparent);
    }

    .modal-missed-list {
      margin-bottom: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .modal-missed-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      font-size: 10px;
      font-family: var(--mono);
      transition: background .12s;
    }
    .modal-missed-item:last-child { border-bottom: none; }
    .modal-missed-item:hover { background: var(--bg); }
    .modal-missed-item input[type="radio"] { accent-color: var(--orange); }
    .modal-missed-item label { cursor: pointer; color: var(--text); flex: 1; }
    .modal-missed-date { color: var(--muted); font-size: 9px; }

    .modal-divider {
      font-size: 9px; font-family: var(--mono);
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted2); margin-bottom: 10px;
    }

    .shift-btn {
      font-size: 9px;
      font-family: var(--mono);
      color: var(--orange);
      border: 1px solid var(--orange);
      background: transparent;
      padding: 3px 9px;
      border-radius: 5px;
      cursor: pointer;
      letter-spacing: .06em;
      transition: all .15s;
      text-transform: uppercase;
      touch-action: manipulation;
    }
    .shift-btn:hover { background: var(--orange); color: #fff; }

    .theme-btn { display: none; } /* géré via .btn-icon */

    /* Override dark mode manuel */
    :root[data-theme="dark"] {
      --bg:      #0c0e14;
      --surface: #12151f;
      --border:  #1c2133;
      --border2: #242a3a;
      --text:    #d0d8ef;
      --muted:   #4a5470;
      --muted2:  #2e3650;
      --green:   #4ecb8d;
      --blue:    #4f8fff;
      --pink:    #ff5c9e;
      --orange:  #ff8c42;
      --red:     #ff6b6b;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.35), 0 1px 5px rgba(0,0,0,.25);
      --shadow-md: 0 3px 10px rgba(0,0,0,.5), 0 1px 3px rgba(0,0,0,.3);
    }

    /* Override light mode manuel */
    :root[data-theme="light"] {
      --bg:       #F7F6F4;
      --surface:  #ffffff;
      --border:   #e8e6e3;
      --border2:  #d0ccc6;
      --text:     #1a1a18;
      --muted:    #8f8b84;
      --muted2:   #bcb8b1;
      --green:    #1a9456;
      --blue:     #2c5fe0;
      --pink:     #d63f74;
      --orange:   #d4620a;
      --red:      #c0392b;
      --shadow-sm: 0 1px 2px rgba(0,0,0,.05), 0 1px 5px rgba(0,0,0,.04);
      --shadow-md: 0 3px 10px rgba(0,0,0,.09), 0 1px 3px rgba(0,0,0,.05);
    }
    @media (prefers-color-scheme: dark) {
      .modal-overlay { background: rgba(0,0,0,.65); }
    }

    #loading {
      text-align: center; padding: 42px 0;
      font-size: 10px; font-family: var(--mono);
      color: var(--muted2); letter-spacing: .08em;
    }
    .loading-dots { display: inline-flex; gap: 5px; margin-top: 10px; }
    .loading-dots span {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--muted2); animation: pulse-dot .9s ease-in-out infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: .18s; }
    .loading-dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes pulse-dot {
      0%, 100% { opacity: .2; transform: scale(.8); }
      50%       { opacity: 1;  transform: scale(1.1); }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-right">
    <!-- Flèches semaine (detail only) -->
    <div class="week-arrows" id="week-arrows">
      <button class="week-arrow" id="prev-week-top" disabled>←</button>
      <button class="week-arrow" id="next-week-top" disabled>→</button>
    </div>

    <!-- Bouton reporter -->
    <button class="shift-btn" id="shift-btn" style="display:none">↷ Reporter</button>

    <!-- Groupe icônes harmonisé -->
    <div class="btn-group">
      <a class="btn-icon" id="detail-link" href="https://sportstats-inky.vercel.app/?mode=detail" target="_blank" rel="noopener" title="Détail">⇗</a>
      <button class="btn-icon" id="refresh-btn" title="Actualiser">↻</button>
      <button class="btn-icon" id="theme-btn" title="Thème"></button>
    </div>
  </div>

  <!-- Modal reporter -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-title" id="modal-title">Reporter les séances</div>
      <div id="modal-missed-section" style="display:none">
        <div class="modal-sub" style="margin-bottom:8px;color:var(--red)">⚠ Séances non réalisées</div>
        <div class="modal-missed-list" id="modal-missed-list"></div>
      </div>
      <div class="modal-divider" id="modal-divider">Reprendre dans</div>
      <div class="modal-input-row">
        <input class="modal-input" id="modal-days" type="number" min="0" max="30" value="0" inputmode="numeric" pattern="[0-9]*"/>
        <span class="modal-input-label">jour(s) · 0 = aujourd'hui</span>
      </div>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-cancel" id="modal-cancel">Annuler</button>
        <button class="modal-btn modal-btn-confirm" id="modal-confirm">Confirmer</button>
      </div>
    </div>
  </div>

  <div class="brand" id="topbar-brand">Rebuild 2026</div>
</div>

<div id="loading">
  Chargement
  <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<div id="main" style="display:none">
  <div class="widget-body">

    <!-- Hero semaine courante (fusionné statut + semaine) -->
    <div id="week-hero" style="display:none; margin-bottom:10px;">
      <div id="week-hero-inner" style="
        border-radius:10px;
        padding:12px 14px 11px;
        border:1px solid;
        background: var(--surface);
        box-shadow: var(--shadow-sm);
      ">
        <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
          <div>
            <div id="hero-week-range" style="font-size:13px; font-weight:600; font-family:var(--mono); color:var(--text); margin-bottom:4px;"></div>
            <div id="hero-status-label" style="font-size:10px; font-family:var(--mono); color:var(--muted); display:flex; align-items:center; gap:5px;"></div>
          </div>
          <div style="text-align:right; flex-shrink:0;">
            <div id="hero-ratio" style="font-size:20px; font-weight:600; font-family:var(--mono);"></div>
            <div id="hero-minutes" style="font-size:9px; font-family:var(--mono); color:var(--muted); margin-top:2px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- KPIs -->
    <div class="kpis" id="kpis"></div>

    <!-- Progression protocole -->
    <div class="progress-wrap">
      <div class="progress-header">
        <span id="progress-header-left">Objectif 30 min</span>
        <span id="progress-right"></span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
      </div>
    </div>

    <!-- Week nav (detail only) -->
    <div class="week-nav" id="week-nav">
      <button class="nav-btn" id="prev-week">←</button>
      <div class="week-label">
        <div id="week-label-name">—</div>
        <div class="week-label-pos" id="week-label-pos"></div>
      </div>
      <div class="toggles" id="toggles" style="display:none;"></div>
      <button class="nav-btn" id="next-week">→</button>
    </div>

    <!-- Toggles wrapper (hidden, replaced by inline) -->
    <div class="toggles-wrap" id="toggles-wrap" style="display:none;"></div>

    <!-- Sessions preview (detail only) -->
    <div class="sessions-preview" id="sessions-preview">
      <div class="sessions-cols">
        <div class="sessions-col upcoming">
          <div class="sessions-col-header">→ À venir</div>
          <div id="upcoming-list"></div>
        </div>
        <div class="sessions-col recent">
          <div class="sessions-col-header">✓ Récent</div>
          <div id="recent-list"></div>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-wrap">
      <div class="chart-header">
        <div class="chart-label" id="chart-label">Minutes de course · évolution</div>
      </div>
      <canvas id="chart"></canvas>
    </div>

    <!-- Table (detail only) -->
    <div class="table-wrap" id="table-wrap" style="display:none">
      <table>
        <thead>
          <tr>
            <th>Semaine</th>
            <th>Séances</th>
            <th>Course</th>
            <th>KB</th>
            <th>EVA ITBS</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>

  </div>
</div>

<script>
const dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
const isDetail = new URLSearchParams(location.search).get("mode") === "detail";

const C = {
  course: dark ? "#4f8fff" : "#2c5fe0",
  kb:     dark ? "#ff5c9e" : "#d63f74",
  kine:   dark ? "#4ecb8d" : "#1a9456",
  orange: dark ? "#ff8c42" : "#d4620a",
};

let allData = null;
let chartInst = null;
let active = { course: true, kb: true };
let selectedIdx = 0;

// Setup detail mode
if (isDetail) {
  document.body.classList.add("detail-mode");
  document.getElementById("detail-link").href = "https://sportstats-inky.vercel.app/";
  document.getElementById("detail-link").title = "Accueil";
  document.getElementById("detail-link").textContent = "⌂";
  document.getElementById("topbar-brand").textContent = "Rebuild 2026";
  document.getElementById("shift-btn").style.display = "flex";
  document.getElementById("week-arrows").classList.add("visible");
  document.getElementById("week-nav").style.display = "none"; // cacher l'ancien week-nav
  document.getElementById("toggles").style.display = "flex";
  document.getElementById("table-wrap").style.display = "block";
  document.getElementById("sessions-preview").style.display = "block";
  document.getElementById("week-nav").classList.add("visible");
}

async function loadData() {
  const btn = document.getElementById("refresh-btn");
  const loadingEl = document.getElementById("loading");
  btn.classList.add("spinning");
  loadingEl.innerHTML = 'Chargement <div class="loading-dots"><span></span><span></span><span></span></div>';
  loadingEl.style.display = "block";
  document.getElementById("main").style.display = "none";

  try {
    const res = await fetch("/api/stats");
    allData = await res.json();
    if (!allData.semaines?.length) throw new Error("Aucune donnée Notion.");
    const today = new Date().toISOString().split("T")[0];
    const curIdx = allData.semaines.findIndex(s => today >= s.debut && today <= addDays(s.debut, 6));
    selectedIdx = curIdx !== -1 ? curIdx : allData.semaines.length - 1;
    render();
  } catch(e) {
    loadingEl.textContent = "Erreur : " + e.message;
  } finally {
    btn.classList.remove("spinning");
  }
}

function fmt(iso) {
  if (!iso) return "?";
  return new Date(iso).toLocaleDateString("fr-FR", { day:"numeric", month:"short" });
}

function addDays(iso, n) {
  const d = new Date(iso); d.setDate(d.getDate() + n);
  return d.toISOString().split("T")[0];
}

function computeStatus(s) {
  if (!s) return null;
  const maxEVA = s.evaList?.length ? Math.max(...s.evaList) : null;
  if (maxEVA !== null && maxEVA >= 3)   return { label:"Stop — ITBS actif", color:"var(--red)",    icon:"🛑" };
  if (maxEVA !== null && maxEVA >= 1.5) return { label:"ITBS 1-2 · surveiller", color:"var(--orange)", icon:"⚠️" };
  if (s.realisees >= s.planifiees && s.planifiees > 0) return { label:"Semaine complétée", color:"var(--green)", icon:"✓" };
  if (s.realisees > 0) return { label:`En cours · ${s.realisees}/${s.planifiees}`, color:"var(--blue)", icon:"→" };
  return { label:"Pas encore démarrée", color:"var(--muted2)", icon:"○" };
}

function renderStatus() {
  const today = new Date().toISOString().split("T")[0];
  const weekToShow = isDetail
    ? allData.semaines[selectedIdx]
    : allData.semaines.find(s => today >= s.debut && today <= addDays(s.debut, 6));

  const hero = document.getElementById("week-hero");
  if (!weekToShow) { hero.style.display = "none"; return; }
  hero.style.display = "block";

  const st = computeStatus(weekToShow);
  const inner = document.getElementById("week-hero-inner");
  inner.style.borderColor = st.color;
  inner.style.background = `color-mix(in srgb, ${st.color} 5%, var(--surface))`;

  document.getElementById("hero-week-range").textContent =
    fmt(weekToShow.debut) + " → " + fmt(addDays(weekToShow.debut, 6));
  document.getElementById("hero-status-label").innerHTML =
    `<span style="color:${st.color}">${st.icon}&nbsp;${st.label}</span>`;
  document.getElementById("hero-ratio").style.color = st.color;
  document.getElementById("hero-ratio").textContent =
    weekToShow.course + "/" + weekToShow.coursePlanifiees + " runs";
  document.getElementById("hero-minutes").textContent =
    weekToShow.minutesCourse ? weekToShow.minutesCourse + " min" : "aucune course";
}

function sessionBadge(type) {
  const map = {
    "Course":     { color: C.course,  label: "RUN" },
    "Kettlebell": { color: C.kb,      label: "KB" },
    "Kiné":       { color: C.kine,    label: "Kiné" },
    "Repos":      { color: "var(--muted2)", label: "Repos" },
  };
  const t = map[type] || { color: "var(--muted2)", label: type };
  return `<span class="session-type-badge" style="color:${t.color};border-color:${t.color};background:${t.color}18">${t.label}</span>`;
}

function fmtWhen(iso) {
  if (!iso) return "";
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(iso); d.setHours(0,0,0,0);
  const diff = Math.round((d - today) / (1000*60*60*24));
  if (diff === 0) return { label:"Aujourd'hui", color: "var(--orange)" };
  if (diff === 1) return { label:"Demain",      color: "var(--blue)" };
  if (diff === -1) return { label:"Hier",        color: "var(--red)" };
  if (diff > 0)   return { label:`Dans ${diff}j`, color: "var(--muted)" };
  return { label:`Il y a ${Math.abs(diff)}j`, color: "var(--muted2)" };
}

function fmtShort(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  const days = ["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  return days[d.getDay()] + " " + d.toLocaleDateString("fr-FR", { day:"numeric", month:"short" });
}

function renderSessionsPreview() {
  if (!isDetail) return;
  const today = new Date().toISOString().split("T")[0];
  const raw = allData.raw || [];

  // Manquées : À faire, date passée, pas Repos, pas Reporté
  const missed = raw
    .filter(s => !s.valide && s.date < today && s.type !== "Repos" && s.statut !== "Reporté")
    .sort((a,b) => a.date.localeCompare(b.date));

  // À venir : À faire, date >= aujourd'hui, pas Repos
  const upcoming = raw
    .filter(s => !s.valide && s.date >= today && s.type !== "Repos")
    .slice(0, 3);

  // Récent : validées, triées par date desc, les 3 dernières
  const recent = raw
    .filter(s => s.valide && s.date < today)
    .slice(-3)
    .reverse();

  function buildItems(list, isPast, isMissed) {
    if (!list.length) return `<div class="session-item" style="cursor:default"><div class="session-meta" style="color:var(--muted2)">Aucune séance</div></div>`;
    return list.map(s => {
      const when = !isPast && !isMissed ? fmtWhen(s.date) : null;
      let metaParts = [];
      if (isMissed) metaParts.push(fmtShort(s.date));
      if (isPast) metaParts.push(fmtShort(s.date));
      if (s.minutes) metaParts.push(s.minutes + " min");

      let evaHtml = "";
      if (isPast && s.eva !== null) {
        const c = s.eva === 0 ? "var(--green)" : s.eva < 2 ? "var(--orange)" : "var(--red)";
        evaHtml = `<span class="session-eva" style="background:${c}"></span>`;
      }

      const whenHtml = when
        ? `<span class="session-when" style="color:${when.color};background:${when.color}15">${when.label}</span>`
        : "";

      const tag = s.url ? "a" : "div";
      const href = s.url ? `href="${s.url}" target="_blank" rel="noopener"` : "";
      const badge = isMissed
        ? `<span class="missed-badge">Manquée</span>`
        : sessionBadge(s.type);
      const cls = isMissed ? "session-item missed" : "session-item";

      return `<${tag} class="${cls}" ${href}>
        ${badge}
        <div class="session-info">
          <div class="session-title">${s.titre}</div>
          <div class="session-meta">${evaHtml}${whenHtml}${metaParts.length ? metaParts.join(" · ") : ""}</div>
        </div>
      </${tag}>`;
    }).join("");
  }

  // Colonne À venir : manquées d'abord (en rouge), puis à venir
  const upcomingHtml = buildItems(missed, false, true) + buildItems(upcoming, false, false);
  document.getElementById("upcoming-list").innerHTML = missed.length || upcoming.length
    ? (missed.length ? buildItems(missed, false, true) : "") + buildItems(upcoming, false, false)
    : `<div class="session-item" style="cursor:default"><div class="session-meta" style="color:var(--muted2)">Aucune séance</div></div>`;

  document.getElementById("recent-list").innerHTML = buildItems(recent, true, false);

  // Stocker les manquées pour la modal
  window._missedSessions = missed;
}

function render() {
  document.getElementById("loading").style.display = "none";
  document.getElementById("main").style.display = "block";
  if (isDetail) {
    renderToggles();
    renderTable();
    updateWeekNav();
    renderSessionsPreview();
  }
  renderKPIs();
  renderProgress();
  renderStatus();
  renderChart();
}

function renderKPIs() {
  const t = allData.totaux;
  const idx = isDetail ? selectedIdx : allData.semaines.length - 1;
  const s = allData.semaines[idx];
  const pct = t.planifiees ? Math.round(t.realisees / t.planifiees * 100) : 0;

  const fields = isDetail ? [
    { label: "Course", val: s.course+"/"+s.coursePlanifiees, sub: fmt(s.debut) + " → " + fmt(addDays(s.debut, 6)) + (s.minutesCourse ? " · " + s.minutesCourse + " min" : ""), color: C.course },
    { label:"KB", val: s.kb || 0, sub: "cette semaine", color: C.kb },
    { label:"EVA max", val: s.evaList?.length ? (Math.max(...s.evaList) === 0 ? "OK" : Math.max(...s.evaList).toFixed(1)) : "—", sub: "ITBS", color: Math.max(...(s.evaList||[0])) === 0 ? C.kine : C.orange },
    { label:"Kiné", val: s.kine || 0, sub: "cette semaine", color: C.orange },
  ] : [
    { label:"Séances total", val: t.realisees+"/"+t.planifiees, sub: pct+"% du plan", color: C.course },
    { label:"Min. course", val: t.minutesCourse || 0, sub: t.courseTotal+" sorties", color: C.kine },
    { label:"KB total", val: t.kbTotal, sub: "séances", color: C.kb },
    { label:"Kiné total", val: t.kineTotal, sub: "séances", color: C.orange },
  ];

  document.getElementById("kpis").innerHTML = fields.map(f => `
    <div class="kpi" style="border-left-color:${f.color}">
      <div class="kpi-label">${f.label}</div>
      <div class="kpi-val" style="color:${f.color}">${f.val}</div>
      <div class="kpi-sub">${f.sub}</div>
    </div>
  `).join("");
}

function renderProgress() {
  const maxBloc = allData.totaux.maxBloc || 0;

  // Objectif évolutif : 30 → 60 → 90 min
  let objectif, label;
  if (maxBloc < 30)      { objectif = 30; label = "Objectif : 30 min continues"; }
  else if (maxBloc < 60) { objectif = 60; label = "Objectif : 60 min continues"; }
  else                   { objectif = 90; label = "Objectif : 90 min (semi)"; }

  const base = objectif === 30 ? 0 : objectif === 60 ? 30 : 60;
  const pct = Math.min(100, Math.round((maxBloc - base) / (objectif - base) * 100));

  document.getElementById("progress-bar").style.width = pct + "%";
  document.getElementById("progress-header-left").textContent = label;
  document.getElementById("progress-right").textContent = maxBloc + " / " + objectif + " min";
}

function renderToggles() {
  document.getElementById("toggles").innerHTML = [
    { key:"course", label:"Course", color: C.course },
    { key:"kb",     label:"KB",     color: C.kb },
  ].map(t => `
    <div class="toggle ${active[t.key] ? "" : "off"}" onclick="toggleLine('${t.key}')">
      <div class="toggle-line" style="background:${t.color}"></div>
      <span>${t.label}</span>
    </div>
  `).join("");
}

function toggleLine(key) {
  active[key] = !active[key];
  renderToggles();
  renderChart();
}

function renderChart() {
  if (chartInst) chartInst.destroy();

  const gridColor = dark ? "#1c2133" : "#eeece9";
  const tickColor = dark ? "#2e3650" : "#c4c0ba";

  if (!isDetail) {
    // Widget: mini line chart — uniquement semaines passées ou en cours
    const today = new Date().toISOString().split("T")[0];
    const done = allData.semaines.filter(s => s.debut <= today).slice(-8);
    chartInst = new Chart(document.getElementById("chart").getContext("2d"), {
      type: "line",
      data: {
        labels: done.map(s => fmt(s.debut)),
        datasets: [{
          data: done.map(s => s.minutesCourse || 0),
          borderColor: C.course,
          borderWidth: 1.5,
          pointRadius: 2,
          fill: true,
          backgroundColor: C.course + "20",
          tension: 0.4,
        }]
      },
      options: {
        responsive: true, animation: false,
        plugins: { legend:{display:false}, tooltip:{enabled:false} },
        scales: { x:{display:false}, y:{display:false} },
      }
    });
    return;
  }

  // Detail: fenêtre de 4 semaines — uniquement semaines passées ou en cours
  const today = new Date().toISOString().split("T")[0];
  const semainesDone = allData.semaines.filter(s => s.debut <= today);
  const clampedIdx = Math.min(selectedIdx, semainesDone.length - 1);
  const winStart = Math.max(0, clampedIdx - 3);
  const winEnd = winStart + Math.min(4, semainesDone.length);
  const win = semainesDone.slice(winStart, winEnd);
  const selInWin = clampedIdx - winStart;

  const datasets = [];

  function makeDs(key, color, label, yAxis) {
    if (!active[key]) return null;
    const vals = win.map(s => key === "course" ? (s.minutesCourse||0) : (s[key]||0));
    return {
      label,
      data: vals,
      borderColor: color,
      borderWidth: 2,
      pointRadius: win.map((_,i) => i === selInWin ? 6 : 3),
      pointBackgroundColor: win.map((_,i) => i === selInWin ? color : (dark?"#12151f":"#ffffff")),
      pointBorderColor: color,
      pointBorderWidth: win.map((_,i) => i === selInWin ? 2.5 : 1.5),
      tension: .3, fill: false,
      yAxisID: yAxis,
    };
  }

  const c = makeDs("course", C.course, "Min. course", "y1");
  const k = makeDs("kb",     C.kb,     "Séances KB",  "y2");
  if (c) datasets.push(c);
  if (k) datasets.push(k);

  chartInst = new Chart(document.getElementById("chart").getContext("2d"), {
    type: "line",
    data: { labels: win.map(s => fmt(s.debut)), datasets },
    options: {
      responsive: true,
      interaction: { mode:"index", intersect:false },
      onClick: (e, els) => {
        if (els.length) { selectedIdx = winStart + els[0].index; updateSelection(); }
      },
      plugins: {
        legend: { display:false },
        tooltip: {
          backgroundColor: dark?"#0c0e14":"#ffffff",
          borderColor: dark?"#1c2133":"#e8e6e3",
          borderWidth: 1,
          titleColor: dark?"#4a5470":"#8f8b84",
          bodyColor: dark?"#d0d8ef":"#1a1a18",
          titleFont:{family:"'IBM Plex Mono'",size:10},
          bodyFont:{family:"'IBM Plex Mono'",size:11},
        }
      },
      scales: {
        x:  { ticks:{color:tickColor,font:{family:"'IBM Plex Mono'",size:9}}, grid:{color:gridColor} },
        y1: { position:"left",  ticks:{color:tickColor,font:{family:"'IBM Plex Mono'",size:9}}, grid:{color:gridColor} },
        y2: { position:"right", ticks:{color:tickColor,font:{family:"'IBM Plex Mono'",size:9}}, grid:{display:false} },
      }
    }
  });
}

function renderTable() {
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("table-body").innerHTML =
    [...allData.semaines].reverse().map((s, i) => {
      const origIdx = allData.semaines.length - 1 - i;
      const isCur = today >= s.debut && today <= addDays(s.debut, 6);
      const isSel = origIdx === selectedIdx;

      let evaHtml = '<span style="color:var(--muted2)">—</span>';
      if (s.evaList?.length) {
        const max = Math.max(...s.evaList);
        const color = max === 0 ? "var(--green)" : max < 2 ? "var(--orange)" : "var(--red)";
        const label = max === 0 ? "OK" : max < 2 ? "1-2" : "3+";
        evaHtml = `<span><span class="dot" style="background:${color}"></span>${label}</span>`;
      }

      return `<tr class="${isCur ? "current-week" : ""}" style="${isSel ? "font-weight:500" : ""}" onclick="selectWeek(${origIdx})" style="cursor:pointer">
        <td>${fmt(s.debut)}</td>
        <td style="color:var(--text)">${s.realisees}/${s.planifiees}</td>
        <td style="color:${C.course}">${s.minutesCourse ? s.minutesCourse+" min" : "—"}</td>
        <td style="color:${C.kb}">${s.kb || "—"}</td>
        <td>${evaHtml}</td>
      </tr>`;
    }).join("");
}

function updateWeekNav() {
  const s = allData.semaines[selectedIdx];
  // ancien week-nav (caché en detail, gardé pour widget)
  if (document.getElementById("week-label-name"))
    document.getElementById("week-label-name").textContent = fmt(s.debut) + " → " + fmt(addDays(s.debut, 6));
  if (document.getElementById("week-label-pos"))
    document.getElementById("week-label-pos").textContent = (selectedIdx+1) + " / " + allData.semaines.length;
  // flèches topbar
  const prevTop = document.getElementById("prev-week-top");
  const nextTop = document.getElementById("next-week-top");
  if (prevTop) prevTop.disabled = selectedIdx === 0;
  if (nextTop) nextTop.disabled = selectedIdx === allData.semaines.length - 1;
  // ancien (compatibilité)
  const prev = document.getElementById("prev-week");
  const next = document.getElementById("next-week");
  if (prev) prev.disabled = selectedIdx === 0;
  if (next) next.disabled = selectedIdx === allData.semaines.length - 1;
}

function updateSelection() {
  renderKPIs();
  renderStatus();
  renderChart();
  if (isDetail) { renderTable(); updateWeekNav(); }
}

function selectWeek(idx) { selectedIdx = idx; updateSelection(); }

document.getElementById("prev-week-top")?.addEventListener("click", () => {
  if (selectedIdx > 0) { selectedIdx--; updateSelection(); }
});
document.getElementById("next-week-top")?.addEventListener("click", () => {
  if (selectedIdx < allData.semaines.length - 1) { selectedIdx++; updateSelection(); }
});
document.getElementById("prev-week")?.addEventListener("click", () => {
  if (selectedIdx > 0) { selectedIdx--; updateSelection(); }
});
document.getElementById("next-week").addEventListener("click", () => {
  if (selectedIdx < allData.semaines.length - 1) { selectedIdx++; updateSelection(); }
});

// ── MODAL REPORTER ──
document.getElementById("shift-btn")?.addEventListener("click", () => {
  const missed = window._missedSessions || [];

  // Construire la modal selon les séances manquées
  const missedSection = document.getElementById("modal-missed-section");
  const missedList = document.getElementById("modal-missed-list");
  const divider = document.getElementById("modal-divider");

  if (missed.length) {
    missedSection.style.display = "block";
    divider.textContent = "Reprendre dans";
    missedList.innerHTML = missed.map((s, i) => `
      <label class="modal-missed-item">
        <input type="radio" name="missed-from" value="${i}" ${i === 0 ? "checked" : ""}/>
        <span>
          <span style="font-size:10px">${s.titre}</span><br>
          <span class="modal-missed-date">${fmtShort(s.date)}</span>
        </span>
      </label>
    `).join("") + `
      <label class="modal-missed-item">
        <input type="radio" name="missed-from" value="today"/>
        <span style="font-size:10px;color:var(--muted)">Ignorer les manquées · reprendre depuis aujourd'hui</span>
      </label>
    `;
  } else {
    missedSection.style.display = "none";
    divider.textContent = "Décaler de";
  }

  document.getElementById("modal-days").value = "0";
  document.getElementById("modal-overlay").classList.add("open");
});

document.getElementById("modal-cancel")?.addEventListener("click", () => {
  document.getElementById("modal-overlay").classList.remove("open");
});

document.getElementById("modal-overlay")?.addEventListener("click", (e) => {
  if (e.target === e.currentTarget) document.getElementById("modal-overlay").classList.remove("open");
});

document.getElementById("modal-confirm")?.addEventListener("click", async () => {
  const days = parseInt(document.getElementById("modal-days").value) || 0;
  if (days < 0 || days > 30) return;

  const missed = window._missedSessions || [];
  const radioVal = document.querySelector('input[name="missed-from"]:checked')?.value;
  const includeMissed = missed.length > 0 && radioVal !== "today";
  const fromIdx = includeMissed && radioVal !== undefined ? parseInt(radioVal) : null;

  const btn = document.getElementById("modal-confirm");
  btn.disabled = true;
  btn.textContent = "En cours…";

  try {
    const res = await fetch("/api/shift", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ days, includeMissed, fromIdx })
    });
    const data = await res.json();

    if (res.ok) {
      document.getElementById("modal-overlay").classList.remove("open");
      btn.textContent = "Confirmer";
      btn.disabled = false;
      await loadData();
    } else {
      btn.textContent = data.error || "Erreur";
      setTimeout(() => { btn.textContent = "Confirmer"; btn.disabled = false; }, 2000);
    }
  } catch (err) {
    btn.textContent = "Erreur réseau";
    setTimeout(() => { btn.textContent = "Confirmer"; btn.disabled = false; }, 2000);
  }
});

// ── THEME TOGGLE ──
function isDark() {
  const saved = localStorage.getItem("theme");
  if (saved) return saved === "dark";
  return window.matchMedia("(prefers-color-scheme: dark)").matches;
}

function applyTheme(dark) {
  document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
  // ☾ contour lune = mode sombre visible, ✦ soleil contour = mode clair visible
  document.getElementById("theme-btn").textContent = dark ? "☀︎" : "☾";
}

function initTheme() {
  applyTheme(isDark());
}

document.getElementById("theme-btn")?.addEventListener("click", () => {
  const currentlyDark = isDark();
  localStorage.setItem("theme", currentlyDark ? "light" : "dark");
  applyTheme(!currentlyDark);
});

// Suivre les changements système si pas de préférence manuelle
window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", (e) => {
  if (!localStorage.getItem("theme")) applyTheme(e.matches);
});

initTheme();

document.getElementById("refresh-btn").addEventListener("click", loadData);

loadData();
</script>
</body>
</html>
